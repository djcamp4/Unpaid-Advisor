steps:
  # Build the backend container and push to Artifact Registry
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - build
      - -t
      - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/unpaid-advisor/backend:${SHORT_SHA}'
      - ./backend
    id: docker-build

  - name: 'gcr.io/cloud-builders/docker'
    args:
      - push
      - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/unpaid-advisor/backend:${SHORT_SHA}'
    id: docker-push
    waitFor: ['docker-build']

  # Deploy backend to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - run
      - deploy
      - unpaid-advisor-api
      - --image=${_REGION}-docker.pkg.dev/${PROJECT_ID}/unpaid-advisor/backend:${SHORT_SHA}
      - --region=${_REGION}
      - --platform=managed
      - --allow-unauthenticated
      - --port=8080
      - --memory=1Gi
      - --cpu=1
      - --min-instances=0
      - --max-instances=10
      - --timeout=60
    id: cloud-run-deploy
    waitFor: ['docker-push']

  # Build frontend
  - name: 'node:20'
    entrypoint: bash
    args:
      - -c
      - |
        cd frontend
        npm ci
        VITE_API_URL=$$VITE_API_URL npm run build
    secretEnv: ['VITE_API_URL']
    id: frontend-build
    waitFor: ['-']

  # Deploy frontend to Firebase Hosting
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: bash
    args:
      - -c
      - |
        npm install -g firebase-tools
        firebase deploy --only hosting --token $$FIREBASE_TOKEN --project ${PROJECT_ID}
    secretEnv: ['FIREBASE_TOKEN']
    id: firebase-deploy
    waitFor: ['frontend-build']

availableSecrets:
  secretManager:
    - versionName: projects/${PROJECT_ID}/secrets/firebase-token/versions/latest
      env: FIREBASE_TOKEN
    - versionName: projects/${PROJECT_ID}/secrets/vite-api-url/versions/latest
      env: VITE_API_URL

substitutions:
  _REGION: us-central1

options:
  logging: CLOUD_LOGGING_ONLY
